apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: im-backend-pdb
  namespace: im-system
  labels:
    app: im-backend
    component: availability
  annotations:
    disruption.k8s.io/min-available: "2"
    disruption.k8s.io/max-unavailable: "1"
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: im-backend
  unhealthyPodEvictionPolicy: AlwaysAllow
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: im-backend-critical-pdb
  namespace: im-system
  labels:
    app: im-backend
    component: critical-availability
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: im-backend
      version: v1.0.0
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: im-backend-pdb-config
  namespace: im-system
data:
  pdb-policy.yaml: |
    # Pod Disruption Budget Policy for IM Backend
    disruption:
      policies:
        - name: standard-pdb
          type: minAvailable
          value: 2
          selector:
            app: im-backend
          unhealthyPodEvictionPolicy: AlwaysAllow
          
        - name: critical-pdb
          type: maxUnavailable
          value: 1
          selector:
            app: im-backend
            version: v1.0.0
      
      # Eviction configuration
      eviction:
        gracefulShutdownTimeout: 300
        terminationGracePeriodSeconds: 300
        preStopHook:
          enabled: true
          command: ["/bin/sh", "-c", "sleep 30 && /app/bin/graceful-shutdown.sh"]
        
        # Pod health checks before eviction
        healthChecks:
          livenessProbeFailureThreshold: 3
          readinessProbeFailureThreshold: 3
          startupProbeFailureThreshold: 30
        
        # Node draining configuration
        nodeDraining:
          enabled: true
          maxGracePeriodSeconds: 3600
          podSelector:
            matchLabels:
              app: im-backend
          forceEvictionTimeoutSeconds: 600
      
      # Availability requirements
      availability:
        sla: 99.95%
        maxUnavailableDuringMaintenance: 1
        minAvailableDuringUpdates: 2
        
        # Maintenance windows
        maintenanceWindows:
          - name: weekly-maintenance
            dayOfWeek: "Sunday"
            startTime: "02:00"
            endTime: "04:00"
            timezone: "UTC"
            maxUnavailable: 1
            
          - name: emergency-maintenance
            maxUnavailable: 0
            requiresApproval: true
      
      # Cluster upgrades and node maintenance
      clusterOperations:
        # During cluster upgrades
        duringUpgrade:
          maxUnavailable: 1
          minAvailable: 1
          drainTimeout: 3600
          
        # During node maintenance
        duringNodeMaintenance:
          maxUnavailable: 1
          minAvailable: 1
          podRescheduleTimeout: 1800
        
        # During zone failures
        duringZoneFailure:
          maxUnavailable: 2
          minAvailable: 1
        
        # Critical scenarios
        criticalScenarios:
          - name: single-zone-failure
            maxUnavailable: 3
            minAvailable: 1
            recoveryTimeObjective: 300
            recoveryPointObjective: 0
            
          - name: cluster-partition
            maxUnavailable: 5
            minAvailable: 1
            recoveryTimeObjective: 600
            recoveryPointObjective: 60
      
      # Monitoring and alerts
      monitoring:
        enabled: true
        metrics:
          - name: pdb_violations
            query: 'kube_pod_disruption_budget_status_current_healthy < kube_pod_disruption_budget_status_desired_healthy'
            severity: warning
            summary: 'PDB violation detected'
            
          - name: unavailable_pods
            query: 'kube_pod_status_phase{phase="Running"} < 3'
            severity: critical
            summary: 'Less than minimum available pods'
            
        alerts:
          - name: pdb-min-available-violation
            condition: 'kube_pod_disruption_budget_status_current_healthy < 2'
            severity: critical
            summary: 'Minimum available pods requirement violated'
            description: 'Fewer than 2 IM Backend pods are available'
            
          - name: pdb-max-unavailable-violation
            condition: '(kube_deployment_status_replicas_available - kube_pod_disruption_budget_status_current_healthy) > 1'
            severity: warning
            summary: 'Max unavailable pods requirement violated'
            description: 'More than 1 IM Backend pod is unavailable'
      
      # Advanced features
      advanced:
        # Pod priority classes
        priorityClasses:
          - name: im-backend-high-priority
            value: 1000000
            preemptionPolicy: PreemptLowerPriority
            globalDefault: false
            
          - name: im-backend-medium-priority
            value: 500000
            preemptionPolicy: Never
            globalDefault: false
        
        # Pod anti-affinity rules
        antiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values: [im-backend]
              topologyKey: kubernetes.io/hostname
              namespaceSelector: {}
              
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [im-backend]
                topologyKey: topology.kubernetes.io/zone
        
        # Pod topology spread constraints
        topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: topology.kubernetes.io/zone
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app: im-backend
                
          - maxSkew: 2
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: DoNotSchedule
            labelSelector:
              matchLabels:
                app: im-backend
    
    # Eviction strategies
    evictionStrategies:
      # Voluntary disruptions (planned maintenance)
      voluntary:
        - type: drain-node
          maxUnavailable: 1
          drainTimeout: 3600
          podSelector:
            matchLabels:
              app: im-backend
          
        - type: pod-deletion
          gracePeriod: 300
          preStopHook: true
          
      # Involuntary disruptions (unplanned)
      involuntary:
        - type: node-failure
          recoveryStrategy: reschedule
          rescheduleTimeout: 300
          
        - type: pod-failure
          recoveryStrategy: restart
          restartLimit: 3
          restartDelay: 30
          
        - type: resource-pressure
          recoveryStrategy: evict-low-priority
          lowPriorityThreshold: 500000