apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: im-backend-gray-vs
  namespace: im-system
spec:
  hosts:
  - im-backend-service.im-system.svc.cluster.local
  http:
  # 灰度流量路由
  - match:
    - headers:
        x-gray-release:
          exact: "gray"
      uri:
        prefix: /api/v1
    route:
    - destination:
        host: im-backend-service.im-system.svc.cluster.local
        subset: gray
        port:
          number: 8080
      weight: 100
  
  # 白名单用户路由
  - match:
    - headers:
        x-user-id:
          regex: "^test-.*"
    route:
    - destination:
        host: im-backend-service.im-system.svc.cluster.local
        subset: gray
        port:
          number: 8080
      weight: 100
  
  # 基于百分比的流量拆分
  - route:
    - destination:
        host: im-backend-service.im-system.svc.cluster.local
        subset: stable
        port:
          number: 8080
      weight: 90
    - destination:
        host: im-backend-service.im-system.svc.cluster.local
        subset: gray
        port:
          number: 8080
      weight: 10
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: im-backend-gray-dr
  namespace: im-system
spec:
  host: im-backend-service.im-system.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 10000
      http:
        h2UpgradePolicy: UPGRADE
        http1MaxPendingRequests: 1000
        http2MaxRequests: 10000
        maxRequestsPerConnection: 100
    loadBalancer:
      simple: LEAST_CONN
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  subsets:
  - name: stable
    labels:
      version: v1.0.0
      track: stable
    trafficPolicy:
      loadBalancer:
        simple: ROUND_ROBIN
  - name: gray
    labels:
      version: v1.1.0-gray
      track: gray
    trafficPolicy:
      loadBalancer:
        simple: ROUND_ROBIN
      connectionPool:
        http:
          http1MaxPendingRequests: 100
          http2MaxRequests: 1000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: im-backend-gray
  namespace: im-system
  labels:
    app: im-backend
    version: v1.1.0-gray
    track: gray
spec:
  replicas: 1
  selector:
    matchLabels:
      app: im-backend
      track: gray
  template:
    metadata:
      labels:
        app: im-backend
        version: v1.1.0-gray
        track: gray
    spec:
      containers:
      - name: im-backend
        image: im-backend:v1.1.0-gray
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 8081
          name: admin
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "kubernetes,production,gray-release"
        - name: IM_GRAYRELEASE_ENABLED
          value: "true"
        - name: IM_GRAYRELEASE_PERCENTAGE
          value: "10"
        - name: IM_APOLLO_ENABLED
          value: "true"
        - name: IM_APOLLO_META_SERVER
          value: "http://apollo-meta-server.im-system:8080"
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: admin
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: admin
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: im-backend-gray-config
  namespace: im-system
data:
  application-gray-release.yml: |
    im:
      grayrelease:
        enabled: true
        header:
          name: X-Gray-Release
          value: gray
        percentage: 10
        whitelist-users:
          - test-user-1
          - test-user-2
          - admin-user
      
      apollo:
        enabled: true
        app:
          id: im-backend
        meta:
          server: http://apollo-meta-server.im-system:8080
        namespace: gray-release
        bootstrap:
          enabled: true
          namespaces: application,gray-release
      
      # 流量染色配置
      traffic:
        coloring:
          enabled: true
          # 基于 Header 的染色
          header-based:
            enabled: true
            headers:
              - name: X-Gray-Release
                value: gray
              - name: X-User-Type
                value: beta-tester
          
          # 基于用户的染色
          user-based:
            enabled: true
            whitelist:
              - test-user-*
              - admin-*
            
          # 基于地区的染色
          region-based:
            enabled: false
            regions:
              - us-west-2
              - eu-west-1
          
          # 基于版本的染色
          version-based:
            enabled: false
            min-version: 2.0.0
      
      # 灰度策略
      strategy:
        # 渐进式发布
        progressive:
          enabled: true
          stages:
            - percentage: 1
              duration: 30m
            - percentage: 5
              duration: 1h
            - percentage: 10
              duration: 2h
            - percentage: 25
              duration: 4h
            - percentage: 50
              duration: 6h
            - percentage: 100
              duration: indefinite
        
        # A/B 测试
        ab-testing:
          enabled: true
          variants:
            - name: variant-a
              percentage: 25
              features:
                new-ui: true
                optimized-search: true
            - name: variant-b
              percentage: 25
              features:
                new-ui: false
                optimized-search: true
            - name: control
              percentage: 50
              features:
                new-ui: false
                optimized-search: false
      
      # 回滚策略
      rollback:
        automatic: true
        conditions:
          - metric: error-rate
            threshold: 0.05
            duration: 5m
          - metric: latency-p99
            threshold: 2000
            duration: 3m
        manual:
          enabled: true
          approvers:
            - admin-user
            - release-manager
      
      # 监控指标
      metrics:
        enabled: true
        collection-interval: 30s
        retention: 7d
        custom:
          - name: gray-request-count
            type: counter
            labels:
              - track
              - version
          - name: gray-latency
            type: histogram
            buckets: [10, 50, 100, 200, 500, 1000, 2000, 5000]
---
apiVersion: v1
kind: Service
metadata:
  name: im-backend-gray-service
  namespace: im-system
  labels:
    app: im-backend
    track: gray
spec:
  selector:
    app: im-backend
    track: gray
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: admin
    port: 8081
    targetPort: 8081
  type: ClusterIP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: im-backend-gray-monitor
  namespace: im-system
  labels:
    app: im-backend
    track: gray
spec:
  selector:
    matchLabels:
      app: im-backend
      track: gray
  endpoints:
  - port: admin
    path: /actuator/prometheus
    interval: 15s
    scheme: http
  namespaceSelector:
    matchNames:
    - im-system