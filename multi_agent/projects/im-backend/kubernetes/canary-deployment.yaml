# canary-deployment.yaml - 金丝雀发布配置
apiVersion: apps/v1
kind: Deployment
metadata:
  name: im-backend-canary
  namespace: im-system
  labels:
    app: im-backend
    component: backend
    version: "1.1.0-canary"
    release-type: canary
    track: canary
  annotations:
    # 金丝雀发布注解
    im.release.strategy: "canary"
    im.release.percentage: "10"
    im.release.duration: "1h"
    im.release.metrics: "error_rate,latency_p95,throughput"
    im.release.rollback-threshold: "5%"
    im.release.promotion-threshold: "99%"
    
    # 监控注解
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/actuator/prometheus"
    prometheus.io/type: "canary"
    
    # 链路追踪注解
    sidecar.istio.io/inject: "true"
    tracing.istio.io/sampling-rate: "100"
    
    # 流量管理注解
    traffic.sidecar.istio.io/includeInboundPorts: "8080"
    traffic.sidecar.istio.io/excludeOutboundPorts: "443"
    
    # 自定义注解
    im.canary.description: "即时通讯系统后端金丝雀发布部署"
    im.canary.owner: "im-release-team"
    im.canary.contact: "release@im.example.com"
    im.canary.sla: "错误率 < 1%，响应时间 < 300ms"
    im.canary.revision: "v1.1.0-canary-001"
    im.canary.created: "2026-03-22T14:00:00Z"
    im.canary.expires: "2026-03-23T14:00:00Z"  # 24小时后自动清理
    
    # 金丝雀发布策略
    im.canary.strategy: |
      1. 初始流量: 10%
      2. 评估指标: 错误率、响应时间、吞吐量
      3. 评估周期: 15分钟
      4. 渐进增加: 每评估周期增加10%流量
      5. 回滚条件: 错误率 > 5% 或响应时间 > 300ms
      6. 升级条件: 99%成功率持续1小时
    
    # 监控仪表板链接
    im.canary.dashboard: "https://grafana.im.example.com/d/canary-im-backend"
    im.canary.alerts: "https://alertmanager.im.example.com/#/alerts?filter=canary"
    im.canary.logs: "https://logs.im.example.com/app/discover#/view/canary-im-backend"
    
    # 紧急联系人
    im.canary.emergency-contacts: |
      - Release Manager: release@im.example.com
      - SRE On-call: +1-555-IM-SRE-ONCALL
      - Emergency Rollback: kubectl rollout undo deployment/im-backend-canary
spec:
  # 金丝雀副本数量 - 通常为总流量的 10%
  replicas: 1
  revisionHistoryLimit: 3  # 保留较少的历史版本
  
  # 发布策略 - 手动控制
  strategy:
    type: Recreate  # 金丝雀发布使用 Recreate 策略确保干净状态
    rollingUpdate: null
  
  selector:
    matchLabels:
      app: im-backend
      component: backend
      track: canary  # 使用不同标签选择器
  
  template:
    metadata:
      labels:
        app: im-backend
        component: backend
        version: "1.1.0-canary"
        track: canary  # 重要：用于流量路由
        release-type: canary
        canary-id: "canary-20260322-001"
      annotations:
        # 金丝雀特定注解
        canary.release.percentage: "10"
        canary.metrics.targets: "error_rate<1%,latency_p95<300ms,throughput>100qps"
        canary.evaluation.window: "15m"
        canary.analysis.interval: "1m"
        canary.scale.step-weight: "10"
        canary.scale.step-interval: "15m"
        canary.iterations.max: "10"
        canary.iterations.current: "0"
        
        # 监控和追踪
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/type: "canary"
        
        # 链路追踪
        sidecar.istio.io/inject: "true"
        tracing.istio.io/sampling-rate: "100"
        
        # 日志配置
        fluentbit.io/parser: "java_multiline_canary"
        log.format: "json"
        log.output: "stdout"
        log.canary-marker: "true"
        
        # 调试配置
        debug.enabled: "true"
        debug.port: "5005"
        debug.suspend: "false"
        
        # 功能开关
        feature.flags: |
          new-message-format: true
          enhanced-search: true
          ai-summarization: false
          experimental-feature-x: false
        
        # 性能监控
        performance.baseline: "stable-v1.0.0"
        performance.tolerance: "10%"
        performance.metrics: |
          - error_rate: <1%
          - latency_p95: <300ms
          - throughput: >100qps
          - memory_usage: <80%
          - cpu_usage: <70%
        
        # 健康检查
        health.check.canary: "true"
        health.check.endpoints: "/actuator/health/canary"
        health.check.interval: "10s"
        health.check.timeout: "5s"
        
        # 版本信息
        version.major: "1"
        version.minor: "1"
        version.patch: "0"
        version.build: "canary-001"
        version.commit: "a1b2c3d4e5f6"
        version.branch: "feature/new-message-format"
        version.released-by: "automated-canary"
        version.release-notes: "https://im.example.com/releases/v1.1.0-canary"
    spec:
      # 服务账户
      serviceAccountName: im-backend-canary-sa
      
      # 节点选择器 - 可以选择特定节点池
      nodeSelector:
        node-type: canary
        cloud.google.com/gke-nodepool: im-canary-pool
      
      # 亲和性 - 与稳定版本分离
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - im-backend
              - key: track
                operator: In
                values:
                - stable
            topologyKey: kubernetes.io/hostname
      
      # 容忍度
      tolerations:
      - key: "canary"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      
      # 优先级 - 较低优先级
      priorityClassName: medium-priority
      
      # 安全上下文
      securityContext:
        runAsUser: 1001  # 使用不同用户
        runAsGroup: 1001
        fsGroup: 1001
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
      
      # 容器定义
      containers:
      - name: im-backend-canary
        image: im-backend:1.1.0-canary  # 金丝雀版本镜像
        imagePullPolicy: Always  # 总是拉取最新
        
        # 资源请求和限制 - 可能与稳定版本不同
        resources:
          requests:
            memory: "256Mi"  # 较低资源请求
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        
        # 端口配置
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: debug
          containerPort: 5005
          protocol: TCP
        - name: canary-metrics
          containerPort: 9091
          protocol: TCP
        
        # 环境变量 - 金丝雀特定配置
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "canary,production"
        - name: CANARY_RELEASE
          value: "true"
        - name: CANARY_PERCENTAGE
          value: "10"
        - name: RELEASE_VERSION
          value: "1.1.0-canary"
        - name: DEPLOYMENT_TRACK
          value: "canary"
        - name: FEATURE_FLAGS
          value: "NEW_MESSAGE_FORMAT=true,ENHANCED_SEARCH=true,AI_SUMMARIZATION=false"
        - name: JAVA_OPTS
          value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Dspring.profiles.active=canary,production -Dcanary.metrics.enabled=true -Dcanary.release.percentage=10 -Ddebug.enabled=true -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
        
        # 从 ConfigMap 和 Secrets 读取配置
        envFrom:
        - configMapRef:
            name: im-backend-canary-config
        - secretRef:
            name: im-backend-canary-secrets
        
        # 金丝雀特定健康检查
        readinessProbe:
          httpGet:
            path: /actuator/health/canary
            port: 8080
            scheme: HTTP
            httpHeaders:
            - name: X-Canary-Check
              value: "true"
          initialDelaySeconds: 20
          periodSeconds: 5  # 更频繁的检查
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        
        startupProbe:
          httpGet:
            path: /actuator/health/startup
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 3
          timeoutSeconds: 2
          successThreshold: 1
          failureThreshold: 10
        
        # 生命周期钩子
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/sh
              - -c
              - |
                echo "金丝雀容器启动..." &&
                echo "版本: 1.1.0-canary" &&
                echo "流量百分比: 10%" &&
                echo "开始金丝雀验证..." &&
                curl -s http://localhost:8080/actuator/health/canary > /dev/null &&
                echo "金丝雀启动完成"
          preStop:
            exec:
              command:
              - /bin/sh
              - -c
              - |
                echo "金丝雀容器停止..." &&
                echo "发送关闭信号..." &&
                # 记录关闭指标
                curl -X POST http://localhost:8080/actuator/metrics/canary-shutdown > /dev/null 2>&1 || true &&
                sleep 10 &&
                echo "金丝雀关闭完成"
        
        # 安全上下文
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsUser: 1001
          runAsGroup: 1001
          seccompProfile:
            type: RuntimeDefault
        
        # 卷挂载
        volumeMounts:
        - name: canary-config-volume
          mountPath: /app/config/canary
          readOnly: true
        - name: canary-logs-volume
          mountPath: /var/log/im-backend-canary
        - name: canary-tmp-volume
          mountPath: /tmp/canary
        
        # 命令行参数
        args:
        - --spring.config.location=file:/app/config/canary/application-canary.yml
        - --logging.config=file:/app/config/canary/logback-canary.xml
        - --canary.release.percentage=10
        - --canary.metrics.enabled=true
        
        # 标准输出配置
        stdin: false
        tty: false
      
      # 边车容器 - 金丝雀指标收集
      - name: canary-metrics-sidecar
        image: prom/prometheus:v2.45.0
        args:
        - --config.file=/etc/prometheus/prometheus.yml
        - --storage.tsdb.path=/prometheus
        - --web.console.libraries=/etc/prometheus/console_libraries
        - --web.console.templates=/etc/prometheus/consoles
        - --web.enable-lifecycle
        ports:
        - containerPort: 9091
          name: metrics
        volumeMounts:
        - name: prometheus-config
          mountPath: /etc/prometheus
        - name: prometheus-data
          mountPath: /prometheus
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
      
      # 卷定义
      volumes:
      - name: canary-config-volume
        configMap:
          name: im-backend-canary-config
      - name: canary-logs-volume
        emptyDir:
          sizeLimit: 5Gi
      - name: canary-tmp-volume
        emptyDir:
          sizeLimit: 1Gi
      - name: prometheus-config
        configMap:
          name: im-backend-canary-prometheus-config
      - name: prometheus-data
        emptyDir:
          sizeLimit: 10Gi
      
      # DNS 配置
      dnsConfig:
        nameservers:
        - 8.8.8.8
        searches:
        - im-system.svc.cluster.local
        options:
        - name: ndots
          value: "2"
      
      # 拓扑约束
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: im-backend
            track: canary

---
# VirtualService - Istio 流量路由配置
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: im-backend-canary-vs
  namespace: im-system
  labels:
    app: im-backend
    component: canary-routing
    version: "1.0.0"
spec:
  hosts:
  - im-backend.im-system.svc.cluster.local
  http:
  - match:
    - headers:
        x-canary-user:
          exact: "true"
    - headers:
        x-user-id:
          regex: "^1.*"  # 用户ID以1开头的用户
    - cookies:
        canary_test:
          exact: "enabled"
    route:
    - destination:
        host: im-backend.im-system.svc.cluster.local
        subset: canary
      weight: 100  # 匹配条件的用户100%路由到金丝雀
    - destination:
        host: im-backend.im-system.svc.cluster.local
        subset: stable
      weight: 0
  
  # 默认路由 - 10%流量到金丝雀
  - route:
    - destination:
        host: im-backend.im-system.svc.cluster.local
        subset: stable
      weight: 90
    - destination:
        host: im-backend.im-system.svc.cluster.local
        subset: canary
      weight: 10

---
# DestinationRule - 定义子集
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: im-backend-dr
  namespace: im-system
  labels:
    app: im-backend
    component: destination-rule
    version: "1.0.0"
spec:
  host: im-backend.im-system.svc.cluster.local
  subsets:
  - name: stable
    labels:
      track: stable
  - name: canary
    labels:
      track: canary
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 30ms
      http:
        http1MaxPendingRequests: 50
        http2MaxRequests: 100
        maxRequestsPerConnection: 10
        maxRetries: 3
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50

---
# CanaryAnalysis - Flagger 配置示例
apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: im-backend-canary
  namespace: im-system
  labels:
    app: im-backend
    component: canary-analysis
    version: "1.0.0"
spec:
  # 目标部署
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: im-backend
  
  # 服务引用
  service:
    port: 8080
    targetPort: 8080
    portDiscovery: true
  
  # 分析配置
  analysis:
    interval: 1m
    threshold: 5
    maxWeight: 50
    stepWeight: 10
    metrics:
    - name: request-success-rate
      threshold: 99
      interval: 1m
    - name: request-duration
      threshold: 300
      interval: 1m
    - name: error-rate
      threshold: 1
      interval: 1m
    - name: throughput
      threshold: 100
      interval: 1m
  
  # 金丝雀发布进度
  progressDeadlineSeconds: 600
  
  # 自动回滚配置
  autoscalerRef:
    apiVersion: autoscaling/v2
    kind: HorizontalPodAutoscaler
    name: im-backend-hpa

---
# ConfigMap - 金丝雀特定配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: im-backend-canary-config
  namespace: im-system
  labels:
    app: im-backend
    component: canary-config
    version: "1.1.0-canary"
data:
  application-canary.yml: |
    # 金丝雀发布特定配置
    spring:
      profiles: canary
      
      # 功能开关
      feature:
        flags:
          new-message-format: true
          enhanced-search: true
          ai-summarization: false
          experimental-feature-x: false
      
      # 监控配置
      management:
        endpoints:
          web:
            exposure:
              include: "*"
        metrics:
          export:
            prometheus:
              enabled: true
          tags:
            track: canary
            version: 1.1.0-canary
    
    # 金丝雀指标配置
    canary:
      metrics:
        enabled: true
        endpoint: /actuator/metrics/canary
        interval: 30s
        exporters:
          prometheus: true
          stdout: false
      
      release:
        percentage: 10
        duration: 1h
        rollback-threshold: 5
        promotion-threshold: 99
    
    # 调试配置
    debug:
      enabled: true
      port: 5005
      suspend: false
    
    # 性能监控
    performance:
      baseline: stable-v1.0.0
      tolerance-percentage: 10
      metrics:
        error-rate-threshold: 1
        latency-p95-threshold: 300
        throughput-minimum: 100
  
  logback-canary.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <configuration>
      <include resource="org/springframework/boot/logging/logback/defaults.xml"/>
      
      <property name="LOG_PATH" value="/var/log/im-backend-canary"/>
      <property name="LOG_FILE" value="${LOG_PATH}/canary.log"/>
      
      <!-- 金丝雀特定控制台输出 -->
      <appender name="CANARY_CONSOLE" class="ch.qos.logback.core.ConsoleAppender">
        <encoder>
          <pattern>%d{yyyy-MM-dd HH:mm:ss} [CANARY] %highlight(%-5level) [%thread] %cyan(%logger{36}) - %msg%n</pattern>
        </encoder>
      </appender>
      
      <!-- 金丝雀文件输出 -->
      <appender name="CANARY_FILE" class="ch.qos.logback.core.rolling.RollingFileAppender">
        <file>${LOG_FILE}</file>
        <rollingPolicy class="ch.qos.logback.core.rolling.SizeAndTimeBasedRollingPolicy">
          <fileNamePattern>${LOG_PATH}/canary-%d{yyyy-MM-dd}.%i.log</fileNamePattern>
          <maxFileSize>10MB</maxFileSize>
          <maxHistory>7</maxHistory>
        </rollingPolicy>
        <encoder>
          <pattern>%d{yyyy-MM-dd HH:mm:ss} [CANARY] %-5level [%thread] %logger{36} - %msg%n</pattern>
        </encoder>
      </appender>
      
      <!-- 金丝雀日志级别 -->
      <logger name="com.im" level="DEBUG"/>
      <logger name="com.im.canary" level="TRACE"/>
      
      <!-- 根日志配置 -->
      <root level="INFO">
        <appender-ref ref="CANARY_CONSOLE"/>
        <appender-ref ref="CANARY_FILE"/>
      </root>
    </configuration>

---
# ServiceAccount - 金丝雀服务账户
apiVersion: v1
kind: ServiceAccount
metadata:
  name: im-backend-canary-sa
  namespace: im-system
  labels:
    app: im-backend
    component: canary-service-account
    version: "1.1.0-canary"

---
# Role - 金丝雀特定角色
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: im-backend-canary-role
  namespace: im-system
  labels:
    app: im-backend
    component: canary-rbac
    version: "1.1.0-canary"
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch"]

---
# RoleBinding - 金丝雀角色绑定
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: im-backend-canary-rolebinding
  namespace: im-system
  labels:
    app: im-backend
    component: canary-rbac
    version: "1.1.0-canary"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: im-backend-canary-role
subjects:
- kind: ServiceAccount
  name: im-backend-canary-sa
  namespace: im-system

---
# NetworkPolicy - 金丝雀网络策略
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: im-backend-canary-network-policy
  namespace: im-system
  labels:
    app: im-backend
    component: canary-network
    version: "1.1.0-canary"
spec:
  podSelector:
    matchLabels:
      app: im-backend
      track: canary
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          istio-injection: enabled
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53