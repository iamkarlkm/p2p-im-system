syntax = "proto3";

package im.websocket;

option java_multiple_files = true;
option java_package = "com.im.backend.grpc.websocket";
option java_outer_classname = "WebSocketProto";

import "im/common.proto";

// WebSocket 事件服务
service WebSocketService {
  // 发送实时事件到客户端
  rpc SendEvent(SendEventRequest) returns (SendEventResponse) {}
  
  // 广播事件到多个用户
  rpc BroadcastEvent(BroadcastEventRequest) returns (BroadcastEventResponse) {}
  
  // 获取在线用户列表
  rpc GetOnlineUsers(GetOnlineUsersRequest) returns (GetOnlineUsersResponse) {}
  
  // 断开用户连接
  rpc DisconnectUser(DisconnectUserRequest) returns (DisconnectUserResponse) {}
  
  // 获取连接统计
  rpc GetConnectionStatistics(GetConnectionStatisticsRequest) returns (GetConnectionStatisticsResponse) {}
  
  // 订阅事件
  rpc SubscribeEvent(SubscribeEventRequest) returns (SubscribeEventResponse) {}
  
  // 取消订阅事件
  rpc UnsubscribeEvent(UnsubscribeEventRequest) returns (UnsubscribeEventResponse) {}
}

// WebSocket 事件类型
enum EventType {
  EVENT_UNKNOWN = 0;
  EVENT_NEW_MESSAGE = 1;
  EVENT_MESSAGE_READ = 2;
  EVENT_MESSAGE_DELIVERED = 3;
  EVENT_MESSAGE_EDITED = 4;
  EVENT_MESSAGE_REVOKED = 5;
  EVENT_TYPING_START = 6;
  EVENT_TYPING_END = 7;
  EVENT_USER_ONLINE = 8;
  EVENT_USER_OFFLINE = 9;
  EVENT_USER_STATUS_CHANGED = 10;
  EVENT_GROUP_CREATED = 11;
  EVENT_GROUP_UPDATED = 12;
  EVENT_GROUP_DELETED = 13;
  EVENT_GROUP_MEMBER_ADDED = 14;
  EVENT_GROUP_MEMBER_REMOVED = 15;
  EVENT_GROUP_MEMBER_ROLE_CHANGED = 16;
  EVENT_CALL_INCOMING = 17;
  EVENT_CALL_ANSWERED = 18;
  EVENT_CALL_ENDED = 19;
  EVENT_NOTIFICATION = 20;
  EVENT_SYSTEM_ALERT = 21;
  EVENT_HEARTBEAT = 22;
  EVENT_CUSTOM = 100;
}

// WebSocket 事件
message WebSocketEvent {
  string event_id = 1;
  EventType type = 2;
  string sender_id = 3;
  repeated string recipient_ids = 4;
  string session_id = 5;
  string group_id = 6;
  int64 timestamp = 7;
  int64 expiry_time = 8;
  int32 priority = 9;
  bool is_persistent = 10;
  bool require_ack = 11;
  map<string, string> metadata = 12;
  oneof payload {
    NewMessagePayload new_message = 13;
    MessageStatusPayload message_status = 14;
    TypingPayload typing = 15;
    UserStatusPayload user_status = 16;
    GroupEventPayload group_event = 17;
    CallEventPayload call_event = 18;
    NotificationPayload notification = 19;
    SystemAlertPayload system_alert = 20;
    CustomPayload custom = 21;
  }
}

// 新消息负载
message NewMessagePayload {
  string message_id = 1;
  im.common.MessageType type = 2;
  string content = 3;
  string sender_id = 4;
  string sender_name = 5;
  repeated im.common.FileInfo attachments = 6;
  bool is_encrypted = 7;
  string encryption_key_id = 8;
  string reply_to_message_id = 9;
  repeated string mentions = 10;
  bool is_urgent = 11;
  map<string, string> metadata = 12;
}

// 消息状态负载
message MessageStatusPayload {
  string message_id = 1;
  im.common.MessageStatus status = 2;
  int64 status_time = 3;
  string status_by = 4;
  string session_id = 5;
}

// 输入状态负载
message TypingPayload {
  string session_id = 1;
  string user_id = 2;
  bool is_typing = 3;
  string typing_content = 4;
  int32 typing_duration_ms = 5;
}

// 用户状态负载
message UserStatusPayload {
  string user_id = 1;
  im.common.UserStatus status = 2;
  string status_message = 3;
  int64 last_active_time = 4;
  string device_id = 5;
  string device_name = 6;
  bool is_typing = 7;
  string typing_session = 8;
}

// 群组事件负载
message GroupEventPayload {
  string group_id = 1;
  string group_name = 2;
  string event_subtype = 3; // created, updated, deleted, member_added, member_removed, etc.
  string actor_id = 4;
  string target_user_id = 5;
  im.group.GroupMemberRole new_role = 6;
  string reason = 7;
  im.group.Group updated_group = 8;
  im.group.GroupMember affected_member = 9;
}

// 通话事件负载
message CallEventPayload {
  string call_id = 1;
  string call_type = 2; // voice, video
  string initiator_id = 3;
  repeated string participant_ids = 4;
  string status = 5; // ringing, answered, ended
  int64 start_time = 6;
  int64 end_time = 7;
  int32 duration_seconds = 8;
  bool has_video = 9;
  bool has_screen_share = 10;
  string end_reason = 11;
}

// 通知负载
message NotificationPayload {
  string notification_id = 1;
  string title = 2;
  string body = 3;
  string icon_url = 4;
  string deep_link = 5;
  repeated string actions = 6;
  int32 badge_count = 7;
  bool is_silent = 8;
  bool require_interaction = 9;
  int64 expiry_time = 10;
  map<string, string> metadata = 11;
}

// 系统警报负载
message SystemAlertPayload {
  string alert_id = 1;
  string severity = 2; // info, warning, error, critical
  string title = 3;
  string message = 4;
  string action_url = 5;
  int64 expiry_time = 6;
  bool require_acknowledgment = 7;
  map<string, string> metadata = 8;
}

// 自定义负载
message CustomPayload {
  string payload_type = 1;
  bytes data = 2;
  string content_type = 3;
  bool is_compressed = 4;
  map<string, string> headers = 5;
}

// 发送事件请求
message SendEventRequest {
  WebSocketEvent event = 1;
  bool wait_for_ack = 2;
  int32 ack_timeout_ms = 3;
  bool retry_on_failure = 4;
  int32 max_retries = 5;
}

// 发送事件响应
message SendEventResponse {
  im.common.CommonResponse common = 1;
  bool delivered = 2;
  string delivery_id = 3;
  int64 delivery_time = 4;
  repeated string failed_recipients = 5;
  string ack_status = 6;
  int32 retry_count = 7;
}

// 广播事件请求
message BroadcastEventRequest {
  WebSocketEvent event = 1;
  repeated string user_ids = 2;
  string group_id = 3;
  bool include_offline = 4;
  bool store_for_offline = 5;
  int32 priority = 6;
  int32 batch_size = 7;
  int32 delay_ms = 8;
}

// 广播事件响应
message BroadcastEventResponse {
  im.common.CommonResponse common = 1;
  int32 total_recipients = 2;
  int32 delivered_count = 3;
  int32 failed_count = 4;
  repeated string failed_user_ids = 5;
  string broadcast_id = 6;
  int64 completion_time = 7;
  map<string, int32> delivery_stats = 8;
}

// 获取在线用户请求
message GetOnlineUsersRequest {
  string group_id = 1;
  string session_id = 2;
  bool include_status = 3;
  bool include_device_info = 4;
  int32 page = 5;
  int32 size = 6;
}

// 获取在线用户响应
message GetOnlineUsersResponse {
  im.common.CommonResponse common = 1;
  repeated string online_user_ids = 2;
  map<string, im.common.UserStatus> user_statuses = 3;
  map<string, string> user_devices = 4;
  im.common.PageResponse pagination = 5;
  int32 total_online = 6;
  int32 total_users = 7;
  double online_percentage = 8;
}

// 断开用户连接请求
message DisconnectUserRequest {
  string user_id = 1;
  string device_id = 2;
  string reason = 3;
  bool notify_user = 4;
  int64 reconnect_delay_ms = 5;
  bool force_disconnect = 6;
}

// 断开用户连接响应
message DisconnectUserResponse {
  im.common.CommonResponse common = 1;
  bool disconnected = 2;
  int32 disconnected_sessions = 3;
  string disconnect_reason = 4;
  int64 disconnect_time = 5;
  int64 reconnect_time = 6;
}

// 获取连接统计请求
message GetConnectionStatisticsRequest {
  im.common.TimeRange time_range = 1;
  string group_by = 2; // minute, hour, day
  bool include_details = 3;
}

// 获取连接统计响应
message GetConnectionStatisticsResponse {
  im.common.CommonResponse common = 1;
  map<string, int32> connections_over_time = 2;
  map<string, int32> events_sent = 3;
  map<string, int32> events_received = 4;
  map<string, int32> message_types = 5;
  int32 total_connections = 6;
  int32 peak_connections = 7;
  string peak_time = 8;
  double avg_connection_duration = 9;
  map<string, int32> error_counts = 10;
  double success_rate = 11;
}

// 订阅事件请求
message SubscribeEventRequest {
  string user_id = 1;
  repeated EventType event_types = 2;
  string session_id = 3;
  string group_id = 4;
  map<string, string> filters = 5;
  int64 expiry_time = 6;
  bool persistent = 7;
}

// 订阅事件响应
message SubscribeEventResponse {
  im.common.CommonResponse common = 1;
  string subscription_id = 2;
  repeated EventType subscribed_events = 3;
  int64 created_time = 4;
  int64 expiry_time = 5;
  map<string, string> subscription_details = 6;
}

// 取消订阅事件请求
message UnsubscribeEventRequest {
  string subscription_id = 1;
  string user_id = 2;
  repeated EventType event_types = 3;
  bool unsubscribe_all = 4;
}

// 取消订阅事件响应
message UnsubscribeEventResponse {
  im.common.CommonResponse common = 1;
  int32 unsubscribed_count = 2;
  bool success = 3;
  repeated EventType remaining_events = 4;
}