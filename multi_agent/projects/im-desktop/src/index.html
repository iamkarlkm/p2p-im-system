<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IM Desktop - 即时通讯</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="message_reply.css">
</head>
<body>
    <div id="app">
        <!-- 登录页面 -->
        <div id="login-page" class="page">
            <div class="login-container">
                <h1>IM Desktop</h1>
                <h2>即时通讯系统</h2>
                <form id="login-form">
                    <div class="form-group">
                        <input type="text" id="username" placeholder="用户名" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="password" placeholder="密码" required>
                    </div>
                    <button type="submit" class="btn-primary">登录</button>
                    <button type="button" class="btn-secondary" id="show-register">注册账号</button>
                </form>
            </div>
        </div>

        <!-- 注册页面 -->
        <div id="register-page" class="page hidden">
            <div class="login-container">
                <h1>IM Desktop</h1>
                <h2>注册账号</h2>
                <form id="register-form">
                    <div class="form-group">
                        <input type="text" id="reg-username" placeholder="用户名" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="reg-password" placeholder="密码" required>
                    </div>
                    <div class="form-group">
                        <input type="text" id="reg-nickname" placeholder="昵称">
                    </div>
                    <div class="form-group">
                        <input type="email" id="reg-email" placeholder="邮箱">
                    </div>
                    <button type="submit" class="btn-primary">注册</button>
                    <button type="button" class="btn-secondary" id="show-login">返回登录</button>
                </form>
            </div>
        </div>

        <!-- 主聊天页面 -->
        <div id="main-page" class="page hidden">
            <!-- 侧边栏 -->
            <div class="sidebar">
                <div class="user-info">
                    <img id="user-avatar" src="" alt="头像" class="avatar">
                    <div class="user-details">
                        <span id="user-nickname">用户昵称</span>
                        <span id="user-status" class="status online">在线</span>
                    </div>
                    <button id="btn-add-friend" class="btn-icon" title="添加好友">➕</button>
                    <button id="btn-notifications" class="btn-icon" title="通知">
                        🔔
                        <span id="notification-badge" class="badge hidden">0</span>
                    </button>
                    <button id="btn-logout" class="btn-icon" title="退出登录">⏻</button>
                </div>
                
                <div class="tabs">
                    <button class="tab active" data-tab="chats">消息</button>
                    <button class="tab" data-tab="friends">好友</button>
                    <button class="tab" data-tab="groups">群组</button>
                    <button class="tab" data-tab="requests">请求</button>
                </div>
                
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="搜索...">
                </div>
                
                <div class="chat-list" id="chat-list">
                    <!-- 聊天列表项将通过JS动态生成 -->
                </div>
            </div>
            
            <!-- 聊天区域 -->
            <div class="chat-area">
                <div class="chat-header">
                    <span id="chat-title">选择会话</span>
                    <div class="chat-actions">
                        <button class="btn-icon" id="btn-video-call" title="视频通话">📹</button>
                        <button class="btn-icon" id="btn-voice-call" title="语音通话">📞</button>
                        <button class="btn-icon" id="btn-more" title="更多">⋯</button>
                    </div>
                </div>
                
                <div class="messages-container" id="messages-container">
                    <div class="empty-state">
                        <p>选择一个会话开始聊天</p>
                    </div>
                </div>
                
                <div class="message-input-area">
                    <div class="input-tools">
                        <button class="btn-icon" id="btn-emoji" title="表情">😊</button>
                        <button class="btn-icon" id="btn-file" title="文件">📎</button>
                        <button class="btn-icon" id="btn-image" title="图片">🖼️</button>
                        <button class="btn-icon" id="btn-voice" title="语音">🎤</button>
                    </div>
                    <textarea id="message-input" placeholder="输入消息..." rows="1"></textarea>
                    <button id="btn-send" class="btn-primary">发送</button>
                </div>
            </div>
            
            <!-- 联系人/群组详情面板 -->
            <div class="detail-panel hidden" id="detail-panel">
                <div class="detail-header">
                    <h3>详情</h3>
                    <button class="btn-icon" id="btn-close-detail">×</button>
                </div>
                <div class="detail-content">
                    <img id="detail-avatar" src="" alt="头像" class="avatar-large">
                    <h4 id="detail-name">名称</h4>
                    <p id="detail-desc">描述</p>
                    
                    <div class="detail-section">
                        <h5>聊天记录</h5>
                        <button class="btn-secondary" id="btn-search-chat">搜索聊天记录</button>
                    </div>
                    
                    <div class="detail-section">
                        <h5>设置</h5>
                        <label class="switch">
                            <input type="checkbox" id="setting-notify">
                            <span class="slider"></span>
                            消息通知
                        </label>
                        <label class="switch">
                            <input type="checkbox" id="setting-sound">
                            <span class="slider"></span>
                            声音
                        </label>
                        <label class="switch">
                            <input type="checkbox" id="setting-vibrate">
                            <span class="slider"></span>
                            振动
                        </label>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 通知 -->
        <div id="notification" class="notification hidden"></div>
        
        <!-- 添加好友/用户搜索弹窗 -->
        <div id="add-friend-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>添加好友</h3>
                    <button class="btn-icon modal-close" data-modal="add-friend-modal">×</button>
                </div>
                <div class="modal-body">
                    <div class="search-box-modal">
                        <input type="text" id="user-search-input" placeholder="搜索用户名、昵称或邮箱...">
                        <button id="btn-search-user" class="btn-primary">搜索</button>
                    </div>
                    <div id="user-search-results" class="search-results">
                        <!-- 搜索结果将通过JS动态生成 -->
                    </div>
                    <div id="friend-request-sent" class="request-sent hidden">
                        <p>好友请求已发送</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 通知中心弹窗 -->
        <div id="notifications-modal" class="modal hidden">
            <div class="modal-content modal-large">
                <div class="modal-header">
                    <h3>通知中心</h3>
                    <button class="btn-icon modal-close" data-modal="notifications-modal">×</button>
                </div>
                <div class="modal-body">
                    <div class="notification-tabs">
                        <button class="notification-tab active" data-type="all">全部</button>
                        <button class="notification-tab" data-type="friend">好友</button>
                        <button class="notification-tab" data-type="group">群组</button>
                        <button class="notification-tab" data-type="system">系统</button>
                    </div>
                    <div id="notifications-list" class="notifications-list">
                        <!-- 通知列表将通过JS动态生成 -->
                    </div>
                    <div id="no-notifications" class="empty-state hidden">
                        <p>暂无通知</p>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="btn-mark-all-read" class="btn-secondary">全部标为已读</button>
                </div>
            </div>
        </div>
        
        <!-- 好友请求弹窗 -->
        <div id="friend-requests-modal" class="modal hidden">
            <div class="modal-content modal-large">
                <div class="modal-header">
                    <h3>好友请求</h3>
                    <button class="btn-icon modal-close" data-modal="friend-requests-modal">×</button>
                </div>
                <div class="modal-body">
                    <div class="friend-request-tabs">
                        <button class="friend-request-tab active" data-type="received">收到的请求</button>
                        <button class="friend-request-tab" data-type="sent">发出的请求</button>
                    </div>
                    <div id="friend-requests-list" class="friend-requests-list">
                        <!-- 好友请求列表将通过JS动态生成 -->
                    </div>
                    <div id="no-friend-requests" class="empty-state hidden">
                        <p>暂无好友请求</p>
                    </div>
                </div>
            </div>
            </div>
    </div>
    
    <script src="main.js"></script>
    <script src="message_reply.js"></script>
</body>
</html>
