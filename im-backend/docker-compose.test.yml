# im-modular 测试环境 Docker Compose 配置
# 包含: MySQL + Redis + MailHog

version: '3.8'

services:
  # MySQL 测试数据库
  mysql:
    image: mysql:8.0
    container_name: im-mysql-test
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: im_test
      MYSQL_USER: im_test
      MYSQL_PASSWORD: test123
    ports:
      - "3307:3306"  # 使用3307避免与本地MySQL冲突
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - im-test-network

  # Redis 测试缓存
  redis:
    image: redis:7-alpine
    container_name: im-redis-test
    ports:
      - "6380:6379"  # 使用6380避免与本地Redis冲突
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - im-test-network

  # MailHog 邮件测试服务器
  mailhog:
    image: mailhog/mailhog:latest
    container_name: im-mailhog-test
    ports:
      - "1025:1025"  # SMTP端口
      - "8025:8025"  # Web UI端口
    networks:
      - im-test-network

  # MinIO 对象存储测试服务器
  minio:
    image: minio/minio:latest
    container_name: im-minio-test
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - im-test-network

  # phpMyAdmin - MySQL管理工具
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: im-phpmyadmin-test
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - im-test-network

  # Redis Commander - Redis管理工具
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: im-redis-commander-test
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8082:8081"
    depends_on:
      - redis
    networks:
      - im-test-network

volumes:
  mysql_data:
  redis_data:
  minio_data:

networks:
  im-test-network:
    driver: bridge
