server:
  port: 8081

spring:
  application:
    name: im-service-user
  
  datasource:
    url: jdbc:mysql://localhost:3306/im_user?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0

jwt:
  secret: mySecretKeyForImSystem12345678901234567890
  expiration: 86400000
  refresh-expiration: 604800000

logging:
  level:
    com.im.service.user: DEBUG
