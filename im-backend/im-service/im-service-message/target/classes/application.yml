spring:
  application:
    name: im-service-message
  
  datasource:
    url: jdbc:mysql://localhost:3306/im_message?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  
  redis:
    host: localhost
    port: 6379
    database: 0

server:
  port: 8082

# 消息服务配置
message:
  recall:
    timeout-minutes: 2
  history:
    retention-days: 365
