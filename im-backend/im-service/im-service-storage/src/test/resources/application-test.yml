spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8085

storage:
  file:
    base-path: ./test-uploads
    base-url: http://localhost:8085/files
    max-size: 10485760

logging:
  level:
    com.im.service.storage: DEBUG
