spring:
  application:
    name: im-service-storage
  
  datasource:
    url: jdbc:mysql://localhost:3306/im_storage?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0

server:
  port: 8085

storage:
  file:
    base-path: ./uploads
    base-url: http://localhost:8085/files
    max-size: 10485760  # 10MB

logging:
  level:
    com.im.service.storage: INFO
