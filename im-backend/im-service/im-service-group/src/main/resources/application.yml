spring:
  application:
    name: im-service-group
  
  datasource:
    url: jdbc:mysql://localhost:3306/im_group?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8083

# 群组服务配置
group:
  default-max-members: 500
  max-group-per-user: 100
