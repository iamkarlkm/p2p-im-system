syntax = "proto3";

package im.common;

option java_multiple_files = true;
option java_package = "com.im.backend.grpc.common";
option java_outer_classname = "CommonProto";

// 通用响应
message CommonResponse {
  int32 code = 1;
  string message = 2;
  int64 timestamp = 3;
}

// 分页请求
message PageRequest {
  int32 page = 1;
  int32 size = 2;
  string sort_by = 3;
  bool descending = 4;
}

// 分页响应
message PageResponse {
  int32 page = 1;
  int32 size = 2;
  int32 total_pages = 3;
  int64 total_elements = 4;
  bool has_next = 5;
  bool has_previous = 6;
}

// 通用状态枚举
enum Status {
  STATUS_UNKNOWN = 0;
  STATUS_ACTIVE = 1;
  STATUS_INACTIVE = 2;
  STATUS_DELETED = 3;
  STATUS_BANNED = 4;
}

// 消息类型枚举
enum MessageType {
  MESSAGE_TYPE_UNKNOWN = 0;
  MESSAGE_TYPE_TEXT = 1;
  MESSAGE_TYPE_IMAGE = 2;
  MESSAGE_TYPE_VOICE = 3;
  MESSAGE_TYPE_VIDEO = 4;
  MESSAGE_TYPE_FILE = 5;
  MESSAGE_TYPE_LOCATION = 6;
  MESSAGE_TYPE_CONTACT = 7;
  MESSAGE_TYPE_SYSTEM = 8;
  MESSAGE_TYPE_CALL = 9;
  MESSAGE_TYPE_RED_PACKET = 10;
}

// 消息状态枚举
enum MessageStatus {
  MESSAGE_STATUS_UNKNOWN = 0;
  MESSAGE_STATUS_SENT = 1;
  MESSAGE_STATUS_DELIVERED = 2;
  MESSAGE_STATUS_READ = 3;
  MESSAGE_STATUS_FAILED = 4;
  MESSAGE_STATUS_PENDING = 5;
}

// 用户在线状态枚举
enum UserStatus {
  USER_STATUS_UNKNOWN = 0;
  USER_STATUS_ONLINE = 1;
  USER_STATUS_OFFLINE = 2;
  USER_STATUS_AWAY = 3;
  USER_STATUS_BUSY = 4;
  USER_STATUS_INVISIBLE = 5;
}

// 群组类型枚举
enum GroupType {
  GROUP_TYPE_UNKNOWN = 0;
  GROUP_TYPE_NORMAL = 1;
  GROUP_TYPE_OFFICIAL = 2;
  GROUP_TYPE_CHANNEL = 3;
  GROUP_TYPE_SUPER = 4;
}

// 时间范围
message TimeRange {
  int64 start_time = 1;
  int64 end_time = 2;
}

// 地理位置
message GeoLocation {
  double latitude = 1;
  double longitude = 2;
  string address = 3;
  string city = 4;
  string country = 5;
}

// 文件信息
message FileInfo {
  string file_id = 1;
  string filename = 2;
  string mime_type = 3;
  int64 file_size = 4;
  string md5_hash = 5;
  string download_url = 6;
  string thumbnail_url = 7;
  int32 width = 8;
  int32 height = 9;
  int32 duration = 10; // 音频/视频时长(秒)
}

// 用户简要信息
message UserBrief {
  string user_id = 1;
  string username = 2;
  string nickname = 3;
  string avatar_url = 4;
  UserStatus status = 5;
  string signature = 6;
}

// 通用错误码
enum ErrorCode {
  ERROR_UNKNOWN = 0;
  ERROR_INVALID_REQUEST = 1;
  ERROR_UNAUTHORIZED = 2;
  ERROR_FORBIDDEN = 3;
  ERROR_NOT_FOUND = 4;
  ERROR_ALREADY_EXISTS = 5;
  ERROR_RATE_LIMITED = 6;
  ERROR_INTERNAL_SERVER = 7;
  ERROR_SERVICE_UNAVAILABLE = 8;
  ERROR_VALIDATION_FAILED = 9;
  ERROR_DATABASE_ERROR = 10;
}