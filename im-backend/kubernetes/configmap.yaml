# configmap.yaml - 应用配置 ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: im-backend-config
  namespace: im-system
  labels:
    app: im-backend
    component: configuration
    version: "1.0.0"
data:
  # 应用基础配置
  application.yml: |
    # ====================================
    # Spring Boot Application Configuration
    # ====================================
    
    # 服务器配置
    server:
      port: 8080
      compression:
        enabled: true
        mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
        min-response-size: 1024
      tomcat:
        max-threads: 200
        min-spare-threads: 20
        max-connections: 10000
        accept-count: 100
        connection-timeout: 30000
    
    # Spring 应用配置
    spring:
      application:
        name: im-backend
      
      # 数据库配置
      datasource:
        url: jdbc:mysql://${MYSQL_HOST:im-mysql}:${MYSQL_PORT:3306}/im_db
        username: ${MYSQL_USER:im_user}
        password: ${MYSQL_PASSWORD}
        driver-class-name: com.mysql.cj.jdbc.Driver
        hikari:
          maximum-pool-size: 20
          minimum-idle: 5
          connection-timeout: 30000
          idle-timeout: 600000
          max-lifetime: 1800000
          leak-detection-threshold: 60000
          pool-name: im-hikari-pool
      
      # JPA/Hibernate 配置
      jpa:
        database-platform: org.hibernate.dialect.MySQL8Dialect
        hibernate:
          ddl-auto: validate
        properties:
          hibernate:
            dialect: org.hibernate.dialect.MySQL8Dialect
            jdbc.batch_size: 50
            order_inserts: true
            order_updates: true
            generate_statistics: false
            show_sql: false
            format_sql: true
            use_sql_comments: false
        open-in-view: false
      
      # Redis 配置
      redis:
        host: ${REDIS_HOST:im-redis}
        port: ${REDIS_PORT:6379}
        password: ${REDIS_PASSWORD}
        database: 0
        timeout: 10000ms
        lettuce:
          pool:
            max-active: 20
            max-idle: 10
            min-idle: 5
            max-wait: 5000ms
      
      # Kafka 配置
      kafka:
        bootstrap-servers: ${KAFKA_BROKERS:im-kafka:9092}
        producer:
          key-serializer: org.apache.kafka.common.serialization.StringSerializer
          value-serializer: org.apache.kafka.common.serialization.StringSerializer
          acks: all
          retries: 3
          batch-size: 16384
          buffer-memory: 33554432
          compression-type: snappy
        consumer:
          key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
          value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
          group-id: im-backend-consumer
          auto-offset-reset: earliest
          enable-auto-commit: false
          max-poll-records: 500
      
      # Elasticsearch 配置
      elasticsearch:
        uris: ${ELASTICSEARCH_URLS:http://im-elasticsearch:9200}
        username: ${ELASTICSEARCH_USERNAME:elastic}
        password: ${ELASTICSEARCH_PASSWORD}
    
    # 应用自定义配置
    im:
      # WebSocket 配置
      websocket:
        enabled: true
        path: /ws
        allowed-origins: "*"
        message-size-limit: 65536
        buffer-size-limit: 524288
        ping-interval: 30000
        pong-timeout: 60000
        max-sessions: 10000
      
      # 消息存储配置
      message:
        storage:
          hot-tier-days: 30
          archive-tier-enabled: true
          archive-tier-provider: s3
          archive-tier-bucket: im-messages-archive
          compression-enabled: true
          compression-algorithm: gzip
      
      # 安全配置
      security:
        jwt:
          secret: ${JWT_SECRET}
          expiration: 86400000
          refresh-expiration: 604800000
        cors:
          allowed-origins: "*"
          allowed-methods: GET,POST,PUT,DELETE,OPTIONS
          allowed-headers: "*"
          allow-credentials: true
          max-age: 3600
    
    # 监控配置
    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics,prometheus
      endpoint:
        health:
          show-details: always
      metrics:
        export:
          prometheus:
            enabled: true
        tags:
          application: im-backend
          environment: production
    
    # 日志配置
    logging:
      level:
        com.im: DEBUG
        org.springframework.web: INFO
        org.springframework.security: INFO
        org.hibernate.SQL: WARN
        org.hibernate.type: WARN
      pattern:
        console: "%d{yyyy-MM-dd HH:mm:ss} - %-5level [%thread] %logger{36} - %msg%n"
        file: "%d{yyyy-MM-dd HH:mm:ss} - %-5level [%thread] %logger{36} - %msg%n"
      file:
        name: /var/log/im-backend/application.log
        max-size: 10MB
        max-history: 30
  
  # 环境特定配置
  application-prod.yml: |
    server:
      port: 8080
      forward-headers-strategy: framework
    
    spring:
      datasource:
        hikari:
          maximum-pool-size: 50
          minimum-idle: 10
          connection-timeout: 30000
          leak-detection-threshold: 0
    
    im:
      security:
        cors:
          allowed-origins: https://im.example.com
      
      websocket:
        max-sessions: 50000
        buffer-size-limit: 1048576
    
    management:
      endpoints:
        web:
          exposure:
            include: health,metrics
      metrics:
        export:
          prometheus:
            enabled: true
        distribution:
          percentiles-histogram:
            http.server.requests: true
  
  # 开发环境配置
  application-dev.yml: |
    server:
      port: 8080
    
    spring:
      jpa:
        show-sql: true
        properties:
          hibernate:
            format_sql: true
    
    im:
      security:
        cors:
          allowed-origins: "*"
      
      websocket:
        max-sessions: 100
    
    management:
      endpoints:
        web:
          exposure:
            include: "*"
  
  # 日志配置文件
  logback-spring.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <configuration>
      <include resource="org/springframework/boot/logging/logback/defaults.xml"/>
      <include resource="org/springframework/boot/logging/logback/console-appender.xml"/>
      
      <property name="LOG_PATH" value="/var/log/im-backend"/>
      <property name="LOG_FILE" value="${LOG_PATH}/application.log"/>
      <property name="MAX_FILE_SIZE" value="10MB"/>
      <property name="MAX_HISTORY" value="30"/>
      
      <!-- 控制台输出 -->
      <appender name="CONSOLE" class="ch.qos.logback.core.ConsoleAppender">
        <encoder>
          <pattern>%d{yyyy-MM-dd HH:mm:ss} - %highlight(%-5level) [%thread] %cyan(%logger{36}) - %msg%n</pattern>
        </encoder>
      </appender>
      
      <!-- 文件输出 -->
      <appender name="FILE" class="ch.qos.logback.core.rolling.RollingFileAppender">
        <file>${LOG_FILE}</file>
        <rollingPolicy class="ch.qos.logback.core.rolling.SizeAndTimeBasedRollingPolicy">
          <fileNamePattern>${LOG_PATH}/application-%d{yyyy-MM-dd}.%i.log</fileNamePattern>
          <maxFileSize>${MAX_FILE_SIZE}</maxFileSize>
          <maxHistory>${MAX_HISTORY}</maxHistory>
          <totalSizeCap>1GB</totalSizeCap>
        </rollingPolicy>
        <encoder>
          <pattern>%d{yyyy-MM-dd HH:mm:ss} - %-5level [%thread] %logger{36} - %msg%n</pattern>
        </encoder>
      </appender>
      
      <!-- 异步日志 -->
      <appender name="ASYNC_FILE" class="ch.qos.logback.classic.AsyncAppender">
        <queueSize>512</queueSize>
        <discardingThreshold>0</discardingThreshold>
        <appender-ref ref="FILE"/>
      </appender>
      
      <!-- 日志级别配置 -->
      <logger name="com.im" level="INFO"/>
      <logger name="org.springframework.web" level="INFO"/>
      <logger name="org.springframework.security" level="WARN"/>
      <logger name="org.hibernate.SQL" level="WARN"/>
      
      <!-- 根日志配置 -->
      <root level="INFO">
        <appender-ref ref="CONSOLE"/>
        <appender-ref ref="ASYNC_FILE"/>
      </root>
    </configuration>