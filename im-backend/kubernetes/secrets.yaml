# secrets.yaml - Kubernetes Secrets 配置模板
# 注意：实际环境中应使用外部 Secret 管理工具如 HashiCorp Vault、Azure Key Vault、AWS Secrets Manager
# 或使用 kubectl create secret generic 创建，切勿将真实密钥提交到版本控制系统

apiVersion: v1
kind: Secret
metadata:
  name: im-backend-secrets
  namespace: im-system
  labels:
    app: im-backend
    component: secrets
    version: "1.0.0"
  annotations:
    description: "即时通讯系统后端密钥配置"
    sealed-date: "2026-03-22"
    rotation-policy: "30-days"
type: Opaque
stringData:
  # ====================================
  # 数据库密钥
  # ====================================
  MYSQL_PASSWORD: "REPLACE_WITH_ACTUAL_PASSWORD"
  MYSQL_ROOT_PASSWORD: "REPLACE_WITH_ROOT_PASSWORD"
  
  # ====================================
  # Redis 密钥
  # ====================================
  REDIS_PASSWORD: "REPLACE_WITH_REDIS_PASSWORD"
  
  # ====================================
  # Elasticsearch 密钥
  # ====================================
  ELASTICSEARCH_PASSWORD: "REPLACE_WITH_ELASTICSEARCH_PASSWORD"
  
  # ====================================
  # JWT 签名密钥
  # ====================================
  JWT_SECRET: "REPLACE_WITH_STRONG_JWT_SECRET_KEY_AT_LEAST_256_BITS"
  
  # ====================================
  # 加密密钥
  # ====================================
  ENCRYPTION_KEY: "REPLACE_WITH_32_BYTE_ENCRYPTION_KEY"
  
  # ====================================
  # API 密钥
  # ====================================
  # 外部服务 API 密钥
  SMS_API_KEY: "REPLACE_WITH_SMS_API_KEY"
  EMAIL_API_KEY: "REPLACE_WITH_EMAIL_API_KEY"
  PUSH_NOTIFICATION_KEY: "REPLACE_WITH_PUSH_NOTIFICATION_KEY"
  
  # ====================================
  # OAuth2 客户端密钥
  # ====================================
  OAUTH2_CLIENT_ID: "REPLACE_WITH_OAUTH2_CLIENT_ID"
  OAUTH2_CLIENT_SECRET: "REPLACE_WITH_OAUTH2_CLIENT_SECRET"
  OAUTH2_REDIRECT_URI: "https://im.example.com/auth/callback"
  
  # ====================================
  # 第三方服务密钥
  # ====================================
  # AI 服务密钥
  OPENAI_API_KEY: "REPLACE_WITH_OPENAI_API_KEY"
  CLAUDE_API_KEY: "REPLACE_WITH_CLAUDE_API_KEY"
  GEMINI_API_KEY: "REPLACE_WITH_GEMINI_API_KEY"
  
  # 对象存储密钥
  S3_ACCESS_KEY: "REPLACE_WITH_S3_ACCESS_KEY"
  S3_SECRET_KEY: "REPLACE_WITH_S3_SECRET_KEY"
  S3_BUCKET_NAME: "im-messages-archive"
  S3_ENDPOINT: "https://s3.amazonaws.com"
  
  # ====================================
  # 监控和日志密钥
  # ====================================
  PROMETHEUS_BASIC_AUTH: "REPLACE_WITH_PROMETHEUS_AUTH_TOKEN"
  GRAFANA_API_KEY: "REPLACE_WITH_GRAFANA_API_KEY"
  SENTRY_DSN: "REPLACE_WITH_SENTRY_DSN_URL"
  
  # ====================================
  # 内部服务通信密钥
  # ====================================
  SERVICE_MESH_TOKEN: "REPLACE_WITH_SERVICE_MESH_AUTH_TOKEN"
  INTERNAL_API_KEY: "REPLACE_WITH_INTERNAL_API_KEY"
  
  # ====================================
  # 证书和 TLS 密钥
  # ====================================
  # TLS 私钥和证书（Base64 编码）
  TLS_PRIVATE_KEY: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_ACTUAL_PRIVATE_KEY
    -----END PRIVATE KEY-----
  TLS_CERTIFICATE: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_ACTUAL_CERTIFICATE
    -----END CERTIFICATE-----
  
  # ====================================
  # 配置模板 - 实际使用说明
  # ====================================
  README: |
    # 即时通讯系统密钥配置说明
    
    ## 密钥管理最佳实践
    
    1. **切勿将真实密钥提交到 Git**
       - 此文件仅为模板
       - 实际密钥应通过安全渠道分发
    
    2. **密钥轮换策略**
       - JWT_SECRET: 每 90 天轮换
       - 数据库密码: 每 180 天轮换
       - API 密钥: 按供应商建议轮换
    
    3. **密钥存储方案**
       - 生产环境: 使用 HashiCorp Vault / AWS Secrets Manager
       - 开发环境: 使用 Kubernetes Secrets + 加密
       - 本地开发: 使用环境变量文件 (.env)
    
    4. **密钥访问控制**
       - 最小权限原则
       - 基于角色的访问控制
       - 审计日志记录所有密钥访问
    
    5. **紧急情况处理**
       - 建立密钥泄露应急响应计划
       - 准备备用密钥
       - 自动化密钥轮换流程
    
    ## 部署前检查清单
    
    [ ] 1. 所有 REPLACE_WITH_* 占位符已替换为真实密钥
    [ ] 2. 密钥强度符合安全策略要求
    [ ] 3. 密钥存储后端已配置并测试
    [ ] 4. 密钥轮换流程已文档化
    [ ] 5. 应急响应计划已准备
    
    ## 创建真实密钥
    
    使用以下命令创建真实密钥文件：
    
    ```bash
    # 创建临时密钥文件
    cat > secrets-values.yaml << EOF
    MYSQL_PASSWORD: $(openssl rand -base64 32)
    JWT_SECRET: $(openssl rand -base64 64)
    ENCRYPTION_KEY: $(openssl rand -base64 32)
    EOF
    
    # 使用 Sealed Secrets 或外部加密工具加密
    kubeseal --format yaml < secrets-values.yaml > sealed-secrets.yaml
    
    # 应用加密后的密钥
    kubectl apply -f sealed-secrets.yaml
    ```
    
    ## 安全联系人
    
    - 安全团队: security@im.example.com
    - 紧急响应: +1-555-IM-EMERGENCY
    - 文档版本: 1.0.0