apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: im-backend-hpa
  namespace: im-system
  labels:
    app: im-backend
    component: autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: im-backend
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: messages_per_second
      target:
        type: AverageValue
        averageValue: 1000
  - type: External
    external:
      metric:
        name: active_connections
        selector:
          matchLabels:
            service: im-backend
      target:
        type: AverageValue
        averageValue: 5000
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
      - type: Percent
        value: 10
        periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
      - type: Percent
        value: 100
        periodSeconds: 60
      selectPolicy: Max
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: im-backend-memory-hpa
  namespace: im-system
  labels:
    app: im-backend
    component: memory-autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: im-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: memory
      target:
        type: AverageValue
        averageValue: 2Gi
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
      - type: Pods
        value: 1
        periodSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
---
apiVersion: custom.metrics.k8s.io/v1beta1
kind: HorizontalPodAutoscaler
metadata:
  name: im-backend-custom-hpa
  namespace: im-system
  labels:
    app: im-backend
    component: custom-metrics-autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: im-backend
  minReplicas: 2
  maxReplicas: 15
  metrics:
  - type: Pods
    pods:
      metricName: http_requests_per_second
      targetAverageValue: 100
  - type: Pods
    pods:
      metricName: websocket_connections
      targetAverageValue: 500
  - type: Pods
    pods:
      metricName: message_processing_latency_ms
      targetAverageValue: 50
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: im-backend-hpa-config
  namespace: im-system
data:
  hpa-config.yaml: |
    # HPA Configuration for IM Backend
    autoscaling:
      enabled: true
      
      # CPU scaling configuration
      cpu:
        targetUtilization: 70
        minReplicas: 2
        maxReplicas: 20
        stabilizationWindow: 300s
      
      # Memory scaling configuration  
      memory:
        targetUtilization: 80
        minReplicas: 2
        maxReplicas: 10
        stabilizationWindow: 600s
      
      # Custom metrics configuration
      customMetrics:
        - name: messages_per_second
          targetValue: 1000
          metricType: Pods
        - name: active_connections
          targetValue: 5000
          metricType: External
        - name: http_requests_per_second
          targetValue: 100
          metricType: Pods
        - name: websocket_connections
          targetValue: 500
          metricType: Pods
        - name: message_processing_latency_ms
          targetValue: 50
          metricType: Pods
      
      # Behavior configuration
      behavior:
        scaleDown:
          policies:
            - type: Pods
              value: 1
              periodSeconds: 60
            - type: Percent
              value: 10
              periodSeconds: 60
          stabilizationWindowSeconds: 300
          selectPolicy: Min
        scaleUp:
          policies:
            - type: Pods
              value: 2
              periodSeconds: 60
            - type: Percent
              value: 100
              periodSeconds: 60
          stabilizationWindowSeconds: 60
          selectPolicy: Max
      
      # Monitoring and alerts
      monitoring:
        enabled: true
        prometheus:
          enabled: true
          scrapeInterval: 15s
        alerts:
          - name: hpa-max-replicas-reached
            condition: 'kube_hpa_status_current_replicas > 18'
            severity: warning
            summary: 'HPA max replicas nearly reached'
          - name: hpa-scaling-failed
            condition: 'kube_hpa_status_condition{condition="ScalingLimited", status="true"}'
            severity: critical
            summary: 'HPA scaling failed'
      
      # Advanced features
      advanced:
        predictiveScaling:
          enabled: false
          cpuHistogramWindow: 24h
          memoryHistogramWindow: 48h
        scheduledScaling:
          enabled: true
          schedules:
            - name: business-hours
              minReplicas: 5
              maxReplicas: 15
              startTime: "09:00"
              endTime: "18:00"
              weekdays: [1,2,3,4,5]
            - name: weekend
              minReplicas: 2
              maxReplicas: 8
              startTime: "00:00"
              endTime: "23:59"
              weekdays: [6,0]
        
    # Metrics collection configuration
    metrics:
      collectionInterval: 30s
      retentionPeriod: 30d
      
      # Custom metrics definitions
      custom:
        - name: messages_per_second
          query: |
            rate(im_messages_sent_total[5m])
          description: "Messages sent per second"
          unit: "messages/s"
          
        - name: active_connections
          query: |
            sum(im_active_connections)
          description: "Total active WebSocket connections"
          unit: "connections"
          
        - name: http_requests_per_second
          query: |
            rate(http_requests_total{handler="im-backend"}[5m])
          description: "HTTP requests per second"
          unit: "requests/s"
          
        - name: websocket_connections
          query: |
            im_websocket_connections_active
          description: "Active WebSocket connections per pod"
          unit: "connections"
          
        - name: message_processing_latency_ms
          query: |
            histogram_quantile(0.95, rate(im_message_processing_duration_seconds_bucket[5m])) * 1000
          description: "95th percentile message processing latency"
          unit: "ms"