apiVersion: apps/v1
kind: Deployment
metadata:
  name: im-backend
  namespace: im-system
  labels:
    app: im-backend
    version: v1.0.0
    component: backend
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: im-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: im-backend
        version: v1.0.0
    spec:
      serviceAccountName: im-backend-sa
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - im-backend
              topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            preference:
              matchExpressions:
              - key: node-type
                operator: In
                values:
                - compute-optimized
      containers:
      - name: im-backend
        image: im-backend:latest
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 8081
          name: admin
          protocol: TCP
        - containerPort: 8082
          name: metrics
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: admin
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: admin
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /actuator/health/startup
            port: admin
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "kubernetes,production"
        - name: JAVA_OPTS
          value: "-XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:InitiatingHeapOccupancyPercent=45 -Xmx2G -Xms2G"
        - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
          value: "health,info,metrics,prometheus"
        - name: LOGGING_LEVEL_ROOT
          value: "INFO"
        - name: LOGGING_LEVEL_ORG_SPRINGFRAMEWORK
          value: "WARN"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
            ephemeral-storage: "1Gi"
          limits:
            memory: "4Gi"
            cpu: "2"
            ephemeral-storage: "2Gi"
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
          readOnly: true
        - name: logs-volume
          mountPath: /app/logs
        - name: tmp-volume
          mountPath: /tmp
      volumes:
      - name: config-volume
        configMap:
          name: im-backend-config
      - name: logs-volume
        emptyDir: {}
      - name: tmp-volume
        emptyDir: {}
      tolerations:
      - key: "dedicated"
        operator: "Equal"
        value: "im-backend"
        effect: "NoSchedule"
---
apiVersion: v1
kind: Service
metadata:
  name: im-backend-service
  namespace: im-system
spec:
  selector:
    app: im-backend
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: admin
    port: 8081
    targetPort: 8081
    protocol: TCP
  - name: metrics
    port: 8082
    targetPort: 8082
    protocol: TCP
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
---
apiVersion: v1
kind: Service
metadata:
  name: im-backend-headless
  namespace: im-system
spec:
  clusterIP: None
  selector:
    app: im-backend
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: im-backend-ingress
  namespace: im-system
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "PUT, GET, POST, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
spec:
  ingressClassName: nginx
  rules:
  - host: im-api.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: im-backend-service
            port:
              number: 8080
      - path: /actuator
        pathType: Prefix
        backend:
          service:
            name: im-backend-service
            port:
              number: 8081
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: im-backend-config
  namespace: im-system
data:
  application-kubernetes.yml: |
    server:
      port: 8080
      shutdown: graceful
    
    management:
      server:
        port: 8081
      endpoints:
        web:
          exposure:
            include: health,info,metrics,prometheus
          base-path: /actuator
      metrics:
        export:
          prometheus:
            enabled: true
        distribution:
          percentiles-histogram:
            http.server.requests: true
    
    logging:
      level:
        root: INFO
        org.springframework: WARN
        org.hibernate: WARN
        com.im.backend: DEBUG
    
    spring:
      application:
        name: im-backend
      datasource:
        url: jdbc:mysql://im-mysql.im-system.svc.cluster.local:3306/im_db?useSSL=false&allowPublicKeyRetrieval=true
        username: ${MYSQL_USERNAME}
        password: ${MYSQL_PASSWORD}
        hikari:
          maximum-pool-size: 20
          minimum-idle: 5
          connection-timeout: 30000
          idle-timeout: 600000
          max-lifetime: 1800000
      jpa:
        database-platform: org.hibernate.dialect.MySQL8Dialect
        show-sql: false
        hibernate:
          ddl-auto: validate
        properties:
          hibernate:
            format_sql: true
            jdbc:
              batch_size: 20
            order_inserts: true
            order_updates: true
    
    im:
      kubernetes:
        enabled: true
        namespace: im-system
        serviceAccount: im-backend-sa
        podName: ${POD_NAME:unknown}
        podIP: ${POD_IP:unknown}
        nodeName: ${NODE_NAME:unknown}
        nodeIP: ${NODE_IP:unknown}